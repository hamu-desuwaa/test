<!doctype html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>課題アンケート</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@700;900&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="style.css?v=20260303-1" />
</head>
<body>
  <main class="sheet">
    <form id="survey-form" novalidate>
      <header class="top-row">
        <h1>課題(アンケート)</h1>
        <label class="name-row" for="name">お名前：</label>
        <input id="name" name="name" type="text" aria-label="お名前" required />
      </header>
      <p id="err-name" class="error"></p>

      <section class="qa-block">
        <label for="goal">・ 目標(配信目標など)</label>
        <textarea id="goal" name="goal" rows="4"></textarea>
      </section>

      <section class="qa-block">
        <label for="available">・ 授業または面談を参加出来る曜日と時間帯を記入してください。</label>
        <textarea id="available" name="available" rows="6" required></textarea>
        <p id="err-available" class="error"></p>
      </section>

      <section class="qa-block">
        <label for="detail">・ 教えれる分野の中で特に詳しく教えて欲しい部分を全て教えてください</label>
        <textarea id="detail" name="detail" rows="6"></textarea>
      </section>

      <section class="qa-block">
        <label for="unknown">・ わからない分野がありましたら詳しく書いてください。</label>
        <textarea id="unknown" name="unknown" rows="6"></textarea>
      </section>

      <div class="actions">
        <button type="submit">保存する</button>
        <p id="status" aria-live="polite"></p>
      </div>
    </form>

    <footer class="memo">
      <p>このアンケートの内容は個人で受け取ります。<br />
      外部にも漏らしませんので、回答した後はスクリーンショットをした後に僕の個人チャットに送ってください。<br />
      ご安心して心配事などを綴ってください。</p>
      <strong>AIS</strong>
    </footer>

    <section class="history" aria-labelledby="history-title">
      <div class="history-head">
        <h2 id="history-title">保存済み回答（この端末）</h2>
        <button id="clear-history" type="button">履歴を削除</button>
      </div>
      <ul id="history-list"></ul>
      <p id="history-empty">まだ保存された回答はありません。</p>
    </section>
  </main>

  <script src="script.js?v=20260303-1"></script>
</body>
</html>
